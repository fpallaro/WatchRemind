name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Phone APK
        run: gradle :phone:assembleDebug --stacktrace
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Watch APK
        run: gradle :app:assembleDebug --stacktrace
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Phone APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneRemind-APK
          path: phone/build/outputs/apk/debug/phone-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Watch APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchRemind-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
